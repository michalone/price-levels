# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "223990817095a461e5090b95d56c4496"
application_url = "https://nvr-price-levels.onrender.com"
embedded = true
name = "Price Levels"
handle = "nvr-price-levels"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_customers,read_companies,write_companies"

[auth]
redirect_urls = [
  "https://nvr-price-levels.onrender.com/auth/callback",
  "https://nvr-price-levels.onrender.com/auth/shopify/callback",
  "https://nvr-price-levels.onrender.com/api/auth/callback"
]

[webhooks]
api_version = "2024-10"

# =====================================================================
# Metaobjects (app-owned) for B2B pricing
# =====================================================================

# 1) Price level
[metaobjects.app.price_level]
name = "Price level"
description = "Price level definition (price list column) for B2B pricing"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.price_level.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.price_level.fields.code]
  name = "Code"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.price_level.fields.base]
  name = "Base"
  type = "single_line_text_field"
  required = true
  validations.choices = ["cost", "rrp"]

  [metaobjects.app.price_level.fields.operation]
  name = "Operation"
  type = "single_line_text_field"
  required = true
  validations.choices = ["plus_pct", "minus_pct", "plus_eur", "equal_to"]

  [metaobjects.app.price_level.fields.value]
  name = "Value"
  type = "number_decimal"
  required = true

  [metaobjects.app.price_level.fields.rounding]
  name = "Rounding"
  type = "number_decimal"

  [metaobjects.app.price_level.fields.position]
  name = "Position"
  type = "number_integer"

  [metaobjects.app.price_level.fields.active]
  name = "Active"
  type = "boolean"

# 2) Supplier price list
[metaobjects.app.supplier_price_list]
name = "Supplier price list"
description = "Purchase price list of a supplier and linked price levels"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.supplier_price_list.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.supplier_price_list.fields.supplier]
  name = "Supplier"
  type = "company_reference"
  required = true

  [metaobjects.app.supplier_price_list.fields.columns]
  name = "Columns (price levels)"
  type = "list.metaobject_reference<$app:price_level>"
  required = true

  [metaobjects.app.supplier_price_list.fields.source_feed]
  name = "Source feed"
  type = "single_line_text_field"

  [metaobjects.app.supplier_price_list.fields.valid_from]
  name = "Valid from"
  type = "date"

  [metaobjects.app.supplier_price_list.fields.valid_to]
  name = "Valid to"
  type = "date"

# 3) Hardstop rule
[metaobjects.app.hardstop_rule]
name = "Hardstop rule"
description = "Hard price limit rule (block / lower / hide)"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.hardstop_rule.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.hardstop_rule.fields.condition]
  name = "Condition"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.hardstop_rule.fields.action]
  name = "Action"
  type = "single_line_text_field"
  required = true
  validations.choices = ["block", "lower", "hide"]

  [metaobjects.app.hardstop_rule.fields.exception_in_quote]
  name = "Exception in quote"
  type = "boolean"

  [metaobjects.app.hardstop_rule.fields.active]
  name = "Active"
  type = "boolean"

# 6) Price audit
[metaobjects.app.price_audit]
name = "Price audit"
description = "Audit record of a price / pricing entity change"
access.admin = "merchant_read_write"

  [metaobjects.app.price_audit.fields.entity]
  name = "Entity"
  type = "single_line_text_field"
  required = true
  validations.choices = ["level", "price_list", "individual", "quote"]

  [metaobjects.app.price_audit.fields.entity_ref]
  name = "Entity reference"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.old_value]
  name = "Old value"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.new_value]
  name = "New value"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.changed_by]
  name = "Changed by"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.date]
  name = "Date"
  type = "date_time"
  required = true

[build]
automatically_update_urls_on_dev = true

# =====================================================================
# Metafield definitions (app-owned)
# Namespaces "pricing" / "feed" as required by the spec.
# ================