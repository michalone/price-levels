# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "223990817095a461e5090b95d56c4496"
application_url = "https://example.com"
embedded = true
name = "price-levels"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_customers,read_companies,write_companies"

# =====================================================================
# Metaobjects (app-owned) for B2B pricing
# =====================================================================

# 1) Price level
[metaobjects.app.price_level]
name = "Price level"
description = "Price level definition (price list column) for B2B pricing"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.price_level.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.price_level.fields.code]
  name = "Code"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.price_level.fields.base]
  name = "Base"
  type = "single_line_text_field"
  required = true
  validations.choices = ["NC", "RRP"]

  [metaobjects.app.price_level.fields.operation]
  name = "Operation"
  type = "single_line_text_field"
  required = true
  validations.choices = ["plus_pct", "minus_pct", "plus_eur"]

  [metaobjects.app.price_level.fields.value]
  name = "Value"
  type = "number_decimal"
  required = true

  [metaobjects.app.price_level.fields.rounding]
  name = "Rounding"
  type = "number_decimal"

  [metaobjects.app.price_level.fields.position]
  name = "Position"
  type = "number_integer"

  [metaobjects.app.price_level.fields.active]
  name = "Active"
  type = "boolean"

# 2) Partner
[metaobjects.app.partner]
name = "Partner"
description = "Business partner (supplier / buyer)"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.partner.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.partner.fields.type]
  name = "Type"
  type = "single_line_text_field"
  required = true
  validations.choices = ["supplier", "buyer", "both"]

  [metaobjects.app.partner.fields.ico]
  name = "Company ID (IČO)"
  type = "single_line_text_field"

  [metaobjects.app.partner.fields.dic]
  name = "Tax ID (DIČ)"
  type = "single_line_text_field"

  [metaobjects.app.partner.fields.vat_id]
  name = "VAT ID"
  type = "single_line_text_field"

  [metaobjects.app.partner.fields.pohoda_id]
  name = "Pohoda ID"
  type = "single_line_text_field"

  [metaobjects.app.partner.fields.own_price_level]
  name = "Own price level"
  type = "boolean"

  [metaobjects.app.partner.fields.company_ref]
  name = "Company"
  type = "company_reference"

  [metaobjects.app.partner.fields.delivery_window]
  name = "Delivery window"
  type = "single_line_text_field"

  [metaobjects.app.partner.fields.loading]
  name = "Loading"
  type = "single_line_text_field"

# 3) Supplier price list
[metaobjects.app.supplier_price_list]
name = "Supplier price list"
description = "Purchase price list of a supplier and linked price levels"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.supplier_price_list.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.supplier_price_list.fields.supplier]
  name = "Supplier"
  type = "metaobject_reference<$app:partner>"
  required = true

  [metaobjects.app.supplier_price_list.fields.columns]
  name = "Columns (price levels)"
  type = "list.metaobject_reference<$app:price_level>"
  required = true

  [metaobjects.app.supplier_price_list.fields.source_feed]
  name = "Source feed"
  type = "single_line_text_field"

  [metaobjects.app.supplier_price_list.fields.valid_from]
  name = "Valid from"
  type = "date"

  [metaobjects.app.supplier_price_list.fields.valid_to]
  name = "Valid to"
  type = "date"

# 4) Individual price
[metaobjects.app.individual_price]
name = "Individual price"
description = "Individual price for a specific customer and variant"
access.admin = "merchant_read_write"

  [metaobjects.app.individual_price.fields.customer]
  name = "Customer"
  type = "company_reference"
  required = true

  [metaobjects.app.individual_price.fields.variant]
  name = "Variant"
  type = "variant_reference"
  required = true

  [metaobjects.app.individual_price.fields.price]
  name = "Price"
  type = "money"
  required = true

  [metaobjects.app.individual_price.fields.type]
  name = "Type"
  type = "single_line_text_field"
  validations.choices = ["fixed", "margin_eur", "hardstop_exception"]

  [metaobjects.app.individual_price.fields.valid_from]
  name = "Valid from"
  type = "date"

  [metaobjects.app.individual_price.fields.valid_to]
  name = "Valid to"
  type = "date"

  [metaobjects.app.individual_price.fields.reason]
  name = "Reason"
  type = "single_line_text_field"

# 5) Hardstop rule
[metaobjects.app.hardstop_rule]
name = "Hardstop rule"
description = "Hard price limit rule (block / lower / hide)"
display_name_field = "name"
access.admin = "merchant_read_write"

  [metaobjects.app.hardstop_rule.fields.name]
  name = "Name"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.hardstop_rule.fields.condition]
  name = "Condition"
  type = "single_line_text_field"
  required = true

  [metaobjects.app.hardstop_rule.fields.action]
  name = "Action"
  type = "single_line_text_field"
  required = true
  validations.choices = ["block", "lower", "hide"]

  [metaobjects.app.hardstop_rule.fields.exception_in_quote]
  name = "Exception in quote"
  type = "boolean"

  [metaobjects.app.hardstop_rule.fields.active]
  name = "Active"
  type = "boolean"

# 6) Price audit
[metaobjects.app.price_audit]
name = "Price audit"
description = "Audit record of a price / pricing entity change"
access.admin = "merchant_read_write"

  [metaobjects.app.price_audit.fields.entity]
  name = "Entity"
  type = "single_line_text_field"
  required = true
  validations.choices = ["level", "price_list", "individual", "quote"]

  [metaobjects.app.price_audit.fields.entity_ref]
  name = "Entity reference"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.old_value]
  name = "Old value"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.new_value]
  name = "New value"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.changed_by]
  name = "Changed by"
  type = "single_line_text_field"

  [metaobjects.app.price_audit.fields.date]
  name = "Date"
  type = "date_time"
  required = true

# =====================================================================
# Metafield definitions (app-owned)
# Namespaces "pricing" / "feed" as required by the spec.
# =====================================================================

# --- Company ---
[company.metafields.pricing.default_level]
name = "Default price level"
type = "metaobject_reference<$app:price_level>"
description = "Default price level for the company"
access.admin = "merchant_read_write"

[company.metafields.pricing.rules]
name = "Pricing rules"
type = "list.metaobject_reference<$app:price_level>"
description = "List of price levels / rules valid for the company"
access.admin = "merchant_read_write"

[company.metafields.pricing.free_shipping]
name = "Free shipping"
type = "boolean"
description = "Free shipping flag for the company"
access.admin = "merchant_read_write"

# --- ProductVariant ---
# Note: the CLI may ignore variant metafield blocks on deploy; in that case
# runtime registration via metafieldDefinitionCreate is required.
[variant.metafields.pricing.cost]
name = "Cost (NC)"
type = "money"
description = "Purchase cost of the variant"
access.admin = "merchant_read_write"

[variant.metafields.pricing.rrp]
name = "RRP"
type = "money"
description = "Recommended retail price of the variant"
access.admin = "merchant_read_write"

[variant.metafields.pricing.supplier]
name = "Supplier"
type = "metaobject_reference<$app:partner>"
description = "Supplier of the variant"
access.admin = "merchant_read_write"

# --- Product ---
[product.metafields.feed.locks]
name = "Feed locks"
type = "json"
description = "Field locks to prevent overwriting by an import feed"
access.admin = "merchant_read_write"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
